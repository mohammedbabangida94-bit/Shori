<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shori |E sho ra yin </title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a237e">

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered!'))
                    .catch(err => console.log('SW Registration Failed:', err));
            });
        }
    </script>

    <style>
        .sos-button {
            width: 200px;
            height: 200px;
            background-color: #d32f2f; /* Nigerian Emergency Red */
            color: white;
            border-radius: 50%;
            border: 8px solid #ffcdd2;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            cursor: pointer;
            display: block;
            margin: 50px auto;
        }

        .sos-button:active {
            background-color: #b71c1c;
            transform: scale(0.95);
        }
        /* While holding down */
        .sos-button.active {
            background-color: orange;
            transform: scale(0.95);
        }

        /* After the alert is sent */
        .sos-button.sent {
            background-color: green;
        }  
    </style>
    </head>
<body>
    <header style="text-align: center; padding: 20px;">
        <h1 style="color: #1a237e;">Shori</h1>
        <p>Abo To daju</p>
    </header>

    <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh;">
        <div id="timer" style="font-size: 2rem; font-weight: bold; margin-bottom: 10px;"></div>
        <div id="statusMsg" style="font-weight: bold; margin-bottom: 20px;">Ready</div>
        
        <button id="sos-btn" class="sos-button">SOS</button>
    <label style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-weight: bold; color: #d32f2f;">
            <input type="checkbox" id="stealthToggle" style="width: 20px; height: 20px;"> 🛡️ Stealth Mode
    </label>
    
    <div class="settings-panel" style="margin-top: 30px; width: 90%; max-width: 400px; background: #ffffff; padding: 20px; border-radius: 15px; border: 2px solid #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h3 style="font-size: 1.1rem; color: #1a237e; margin-bottom: 15px;">Emergency Profile</h3>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="contact1" placeholder="Primary Phone (e.g. +234...)" value="+234XXXXXXXXXX" style="display: block; margin: 10px auto; padding: 12px; width: 90%; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem;">
        <input type="text" id="contact2" placeholder="Secondary Phone" style="display: block; margin: 10px auto; padding: 12px; width: 90%; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem;">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div style="text-align: left; padding: 0 10px;">
        
        <h3 style="font-size: 1rem; color: #333;">Medical Intelligence & Modes</h3>
        <input type="text" id="bloodGroup" placeholder="Blood Group (e.g., O+)" style="display: block; margin: 10px 0; padding: 10px; width: 100%; border-radius: 5px; border: 1px solid #ddd;">
        <input type="text" id="allergies" placeholder="Allergies (e.g., Nuts)" style="display: block; margin: 10px 0; padding: 10px; width: 100%; border-radius: 5px; border: 1px solid #ddd;">
    </div>
    <p style="font-size: 0.7rem; color: #666;">This data is sent to responders during an SOS.</p>
</div>
    </main>

    <audio id="sirenAudio" src="siren.mp3" preload="auto" loop></audio>

    <script src="app.js"></script>
    
</body>
</html>
